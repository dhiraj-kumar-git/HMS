services:
  redis:
    image: "redis:alpine"
    container_name: hms-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    container_name: hms-backend
    restart: unless-stopped
    depends_on:
      - redis
      - minio
    ports:
      - "5000:5000"
    # Safely load the .env file (containing secret MONGO_URI) from the backend directly
    env_file:
      - ./backend/.env
    environment:
      - FLASK_ENV=production
      - FLASK_APP=main.py
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-http://minio:9000}
      - S3_BUCKET=${S3_BUCKET:-hms-lab-reports}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-admin}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-YourSecurePassword123}
      - S3_PUBLIC_URL=${S3_PUBLIC_URL:-http://localhost:9000}

  frontend:
    build:
      context: ./frontend
    container_name: hms-frontend
    restart: unless-stopped
    ports:
      - "3000:80"

    # Make sure the API is awake before slamming NGINX into production
    depends_on:
      - backend

  minio:
    image: minio/minio:latest
    container_name: hms-minio
    restart: unless-stopped
    ports:
      - "9001:9001"
    volumes:
      - ./minio-data:/data
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-admin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-YourSecurePassword123}
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    command: server /data --console-address ":9001"
